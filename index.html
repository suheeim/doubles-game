<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ダブルスゲーム">
<title>ダブルスゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #5B9E6B; --green-dark: #3A6B47; --green-light: #E8F5EC;
  --gray: #2A2A2A; --border: rgba(0,0,0,0.1);
  --text: #FFFFFF; --text2: #CCCCCC; --text3: #888888;
  --surface: #1E1E1E; --bg: #121212;
  --radius: 14px; --radius-sm: 9px;
  --amber: #BA7517; --amber-light: #FAEEDA;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { overflow-x: hidden; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; padding-bottom: 30px; }
.header { background: transparent; padding: 12px 16px; position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 100; display: flex; align-items: center; justify-content: flex-end; }
.header h1 { font-size: 18px; font-weight: 700; }
.footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 100; background: #1E1E1E; border-top: 1px solid #333; display: flex; align-items: center; }
.page-content { padding-bottom: 70px; padding-top: var(--header-height, 52px); }
.header h1 { font-size: 20px; font-weight: 700; }
.header p { font-size: 13px; opacity: .8; margin-top: 2px; }
.screen { display: none; padding: 16px; }
.screen.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--green); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; overflow: visible; }
.label { font-size: 12px; font-weight: 700; color: var(--green); letter-spacing: .08em; margin-bottom: 8px; }
.check-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--green); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; cursor: pointer; color: #FFFFFF; }
.check-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--green); flex-shrink: 0; }
.input-row { display: flex; align-items: center; background: #5A5A5A; border: 1px solid #666; border-radius: var(--radius-sm); padding: 0 12px; gap: 6px; margin-bottom: 8px; }
.input-row input { flex: 1; font-size: 22px; font-weight: 700; color: #FFFFFF; text-align: center; padding: 10px 0; border: none; outline: none; background: transparent; font-family: 'Noto Sans JP', sans-serif; }
.input-row span { font-size: 14px; color: var(--text3); }
.step-num { display: none; }
.step-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #FFFFFF; display: flex; align-items: center; }
.name-list { display: flex; flex-direction: column; gap: 8px; }
.name-row { display: flex; align-items: center; gap: 8px; background: #5A5A5A; border: 1px solid var(--green); border-radius: var(--radius-sm); padding: 8px 12px; overflow: visible; }
.name-num { width: 26px; height: 26px; border-radius: 50%; background: #3A3A3A; color: #CCCCCC; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.name-input { flex: 1; min-width: 0; font-size: 15px; border: none; outline: none; background: transparent; font-family: 'Noto Sans JP', sans-serif; color: #FFFFFF; }
.btn-primary { width: 100%; padding: 15px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .15s; }
.btn-primary:active { background: var(--green-dark); }
.btn-primary:disabled { opacity: 1; background: #2A4A35; color: #5B9E6B; cursor: not-allowed; }
.btn-secondary { width: 100%; padding: 13px; background: var(--surface); color: #FFFFFF; border: 1px solid #444; border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; margin-top: 8px; }
.btn-danger { width: 100%; padding: 15px; background: #E24B4A; color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; margin-top: 12px; }

/* ゲームカード */
.game-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; transition: all .3s; }
.game-card.active { border-color: var(--green); }
.game-card.done { border-color: #444; background: #1A1A1A; }
.game-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--gray); color: #FFFFFF; }
.game-header.active { background: var(--green); color: #fff; }
.game-header.done { background: #2A2A2A; color: var(--text3); }
.game-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.game-body { padding: 12px; overflow: visible; }
.vs-grid { display: grid; grid-template-columns: 1fr 36px 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
.team { background: var(--gray); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
.team.winner { background: var(--gray); border: 2px solid var(--green); }
.team-lbl { font-size: 10px; font-weight: 700; color: var(--green); letter-spacing: .08em; margin-bottom: 4px; }
.pname { font-size: 14px; font-weight: 500; padding: 2px 0; color: #FFFFFF; }
.vs-text { text-align: center; font-size: 14px; font-weight: 700; color: var(--text3); }
.score-row { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.score-inputs { display: flex; align-items: center; gap: 8px; width: 100%; }
.score-input { flex: 1; min-width: 0; text-align: center; font-size: 20px; font-weight: 700; padding: 8px; border: 1px solid #666; border-radius: var(--radius-sm); background: #5A5A5A; color: #FFFFFF; font-family: 'Noto Sans JP', sans-serif; outline: none; }
.score-input:focus { border-color: var(--green); }
.score-input.done { border: none; background: transparent; color: var(--text2); pointer-events: none; }
.score-vs { font-size: 14px; font-weight: 700; color: var(--text3); text-align: center; }
.confirm-btn { width: 100%; padding: 10px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.confirm-btn:disabled { opacity: 1; background: #2A4A35; color: #5B9E6B; cursor: not-allowed; }
.edit-btn { padding: 6px 12px; background: var(--surface); color: var(--text3); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.game-body-collapsed { display: none; }
.game-header-done { cursor: pointer; }

/* ランキング */
.rank-row { display: grid; grid-template-columns: 36px 1fr auto auto; align-items: center; gap: 4px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.rank-num { font-size: 18px; font-weight: 700; color: var(--text3); min-width: 32px; }
.rank-num.gold { color: #F0A500; }
.rank-num.silver { color: #A0A0A0; }
.rank-num.bronze { color: #C07020; }
.rank-name { flex: 1; font-size: 15px; font-weight: 500; color: #FFFFFF; }
.rank-wins { font-size: 16px; font-weight: 700; color: var(--green); }
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
.warn { background: var(--amber-light); color: var(--amber); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; margin-top: 8px; }
.mic-btn {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: var(--gray); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; transition: background .15s;
}
.mic-btn.recording { background: #FCEBEB; border-color: #E24B4A; animation: pulse .6s infinite alternate; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }
.tab-bar { display: flex; flex: 1; }
.tab-btn { flex: 1; padding: 10px 4px 12px; border: none; background: transparent; font-family: 'Noto Sans JP', sans-serif; font-size: 18px; font-weight: 700; color: #888888; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; transition: color .15s; filter: grayscale(1) brightness(0.7); }
.tab-btn .tab-label { font-size: 10px; font-weight: 500; color: #FFFFFF; }
.tab-btn.active { color: var(--green); filter: none; }
.tab-btn.active .tab-label { color: var(--green); }
.tab-btn:disabled { opacity: 1; color: #555555; cursor: not-allowed; filter: grayscale(1) brightness(0.5); }
.tab-btn:disabled .tab-label { color: #555555; }
.footer-icon-btn { flex: 1; padding: 10px 4px 12px; border: none; background: transparent; font-size: 22px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--text3); }
.footer-icon-btn .tab-label { font-size: 10px; font-weight: 500; color: #FFFFFF; }
#langBtn { position: relative; }
#langMenu { position: absolute; top: 44px; right: 0; background:#fff; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.18); z-index:9999; min-width:56px; display:none; }
body.finished #addGameBtn,
body.finished #endGameBtn,
body.finished #startBtn { display: none; }
body.finished .confirm-btn { display: none; }
body.finished .edit-btn { display: none; }
body.finished #playerCountInput,
body.finished #gameCountInput { pointer-events: none; border: none; background: transparent; color: #FFFFFF; font-weight: 700; }
body.finished #noNameChk { pointer-events: none; opacity: 0.4; }
body.finished .mic-btn { display: none; }
body.finished .input-row { background: transparent; border: none; }
body.finished .name-input { pointer-events: none; color: #FFFFFF; }
body.finished .name-row { background: transparent; border: none; pointer-events: none; }
</style>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <button id="resetBtn" onclick="resetAll()" style="background:none;border:none;color:var(--green);font-size:22px;cursor:pointer;padding:4px;line-height:1">🔄</button>
    <div style="position:relative">
      <div onclick="toggleLangMenu()" id="langBtn" style="cursor:pointer;font-size:22px;line-height:1">
        <span id="langFlag">🇯🇵</span>
      </div>
      <div id="langMenu">
        <div onclick="selectLang('ja')" style="padding:10px 14px;font-size:20px;cursor:pointer;text-align:center;border-bottom:1px solid #f0f0f0">🇯🇵</div>
        <div onclick="selectLang('en')" style="padding:10px 14px;font-size:20px;cursor:pointer;text-align:center;border-bottom:1px solid #f0f0f0">🇺🇸</div>
        <div onclick="selectLang('kr')" style="padding:10px 14px;font-size:20px;cursor:pointer;text-align:center">🇰🇷</div>
      </div>
    </div>
  </div>
</div>
<div class="footer">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-main" onclick="showScreen('main')"><span class="tab-icon">👥</span><span class="tab-label" id="t-tab-main">参加者</span></button>
    <button class="tab-btn" id="tab-game" onclick="showScreen('game');if(games.length)renderGames();" disabled><span class="tab-icon">🎾</span><span class="tab-label" id="t-tab-game">ゲーム</span></button>
    <button class="tab-btn" id="tab-result" onclick="showScreen('result')" disabled><span class="tab-icon">🏆</span><span class="tab-label" id="t-tab-result">ランキング</span></button>
  </div>
</div>

<div class="page-content">
<!-- メイン画面 -->
<div id="screen-main" class="screen active">
  <label class="check-row">
    <input type="checkbox" id="noNameChk" onchange="onNoNameChange()">
    <span id="t-no-name-label" style="font-size:15px;font-weight:500">名前入力不要（番号が名前になる）</span>
    
  </label>

  <div class="card">
    <div class="step-title"><svg width="22" height="22" viewBox="0 0 22 22" style="flex-shrink:0;margin-right:6px"><ellipse cx="11" cy="8" rx="7" ry="8" fill="none" stroke="#5B9E6B" stroke-width="2"/><line x1="6" y1="4.5" x2="16" y2="4.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="5" y1="8" x2="17" y2="8" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="6" y1="11.5" x2="16" y2="11.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="8.5" y1="1" x2="8.5" y2="15.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="11" y1="0.5" x2="11" y2="16" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="13.5" y1="1" x2="13.5" y2="15.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><rect x="9.8" y="15.8" width="2.4" height="5.5" rx="1.2" fill="#5B9E6B"/></svg><span id="t-step1-title">参加者数を入力</span></div>
    <div class="input-row">
      <input id="playerCountInput" type="number" inputmode="numeric" placeholder="例: 7" min="4" max="20"
        oninput="this.value=this.value.replace(/[^0-9]/g,'');onSettingChange()">
      <span id="t-step1-unit">人</span>
      <button class="mic-btn" id="micPlayer" type="button" onclick="startVoiceCount('playerCountInput', 'micPlayer', 4, 20, onSettingChange)">🎤</button>
    </div>
    <div id="countError" style="font-size:12px;color:var(--amber);display:none;margin-top:4px"></div>
  </div>

  <div class="card">
    <div class="step-title"><svg width="22" height="22" viewBox="0 0 22 22" style="flex-shrink:0;margin-right:6px"><ellipse cx="11" cy="8" rx="7" ry="8" fill="none" stroke="#5B9E6B" stroke-width="2"/><line x1="6" y1="4.5" x2="16" y2="4.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="5" y1="8" x2="17" y2="8" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="6" y1="11.5" x2="16" y2="11.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="8.5" y1="1" x2="8.5" y2="15.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="11" y1="0.5" x2="11" y2="16" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="13.5" y1="1" x2="13.5" y2="15.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><rect x="9.8" y="15.8" width="2.4" height="5.5" rx="1.2" fill="#5B9E6B"/></svg><span id="t-step2-title">ゲーム回数を入力</span></div>
    <div class="input-row">
      <input id="gameCountInput" type="number" inputmode="numeric" placeholder="例: 5" min="1" max="30"
        oninput="this.value=this.value.replace(/[^0-9]/g,'');onSettingChange()">
      <span id="t-step2-unit">回</span>
      <button class="mic-btn" id="micGame" type="button" onclick="startVoiceCount('gameCountInput', 'micGame', 1, 30, onSettingChange)">🎤</button>
    </div>
  </div>
  <div id="gamesPerPersonCard" style="display:none;background:var(--green-light);border:1px solid var(--green);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;font-size:13px;font-weight:700;color:var(--green-dark)">
    <span id="t-games-per-person"></span>
  </div>

  <div class="card" id="nameCard" style="display:none">
    <div class="step-title"><svg width="22" height="22" viewBox="0 0 22 22" style="flex-shrink:0;margin-right:6px"><ellipse cx="11" cy="8" rx="7" ry="8" fill="none" stroke="#5B9E6B" stroke-width="2"/><line x1="6" y1="4.5" x2="16" y2="4.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="5" y1="8" x2="17" y2="8" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="6" y1="11.5" x2="16" y2="11.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="8.5" y1="1" x2="8.5" y2="15.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="11" y1="0.5" x2="11" y2="16" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><line x1="13.5" y1="1" x2="13.5" y2="15.5" stroke="#5B9E6B" stroke-width="1.2" opacity="0.8"/><rect x="9.8" y="15.8" width="2.4" height="5.5" rx="1.2" fill="#5B9E6B"/></svg><span id="t-step3-title">名前入力（任意）</span></div>
    <div class="name-list" id="nameList"></div>
  </div>

  <button class="btn-primary" id="startBtn" onclick="startGame()" disabled>
    <span id="t-start-btn">ゲーム組み合わせ作成</span>
  </button>
</div>

<!-- ゲーム画面 -->
<div id="screen-game" class="screen">
  <div id="gameList"></div>
  <div id="gameBtns">
    <button class="btn-secondary" id="addGameBtn" onclick="addGame()"><span id="t-add-game-btn">＋ ゲームを追加</span></button>
    <button class="btn-danger" id="endGameBtn" onclick="showResult()"><span id="t-end-game-btn">🏆 ゲーム終了・結果へ</span></button>
  </div>
</div>

<!-- 結果画面 -->
<div id="screen-result" class="screen">
  <div class="card">
    <div style="font-size:15px;font-weight:700;color:#FFFFFF;margin-bottom:12px;" id="t-rank-title">🏆 個人ランキング（勝利数）</div>
    <div id="rankList"></div>
  </div>
</div>
</div><!-- /.page-content -->

<script>

// ヘッダー高さをCSS変数に反映
function updateHeaderHeight() {
  var h = document.querySelector('.header');
  if (h) document.documentElement.style.setProperty('--header-height', h.offsetHeight + 'px');
}
window.addEventListener('load', updateHeaderHeight);
window.addEventListener('resize', updateHeaderHeight);

var currentLang = 'ja';
var i18n = {};

function toggleLangMenu() {
  var menu = document.getElementById('langMenu');
  if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function selectLang(lang) {
  var menu = document.getElementById('langMenu');
  if (menu) menu.style.display = 'none';
  setLang(lang);
}

document.addEventListener('click', function(e) {
  var btn = document.getElementById('langBtn');
  var menu = document.getElementById('langMenu');
  if (menu && btn && !btn.contains(e.target) && !menu.contains(e.target)) {
    menu.style.display = 'none';
  }
});

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('score_game_lang', lang);
  var icons = {'ja':'🇯🇵','en':'🇺🇸','kr':'🇰🇷'};
  var langBtn = document.getElementById('langBtn');
  if (langBtn) langBtn.textContent = icons[lang] || '🇯🇵';
  loadI18n(lang, applyI18n);
}

function loadI18n(lang, callback) {
  var file = lang === 'ja' ? 'ja' : lang === 'en' ? 'en' : 'kr';
  fetch(file + '.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) { i18n = data; callback(); })
    .catch(function() { console.warn('Failed to load ' + file + '.json'); });
}

function t(key) {
  return (key in i18n) ? i18n[key] : key;
}

function applyI18n() {
  document.title = t('app_title');
  var map = {
    't-app-name': 'app_name',
    't-tab-main': 'tab_main',
    't-tab-game': 'tab_game',
    't-tab-result': 'tab_result',
    't-no-name-label': 'no_name_label',
    't-no-name-sub': 'no_name_sub',
    't-step1-title': 'step1_title',
    't-step1-unit': 'step1_unit',
    't-step2-title': 'step2_title',
    't-step2-unit': 'step2_unit',
    't-step3-title': 'step3_title',
    't-start-btn': 'start_btn',
    't-add-game-btn': 'add_game_btn',
    't-end-game-btn': 'end_game_btn',
    't-rank-title': 'rank_title',
    't-reset-btn': 'reset_btn',
    't-reset-header': 'reset_btn',
  };
  Object.keys(map).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.textContent = t(map[id]);
  });
  // エラーメッセージ更新
  var err = document.getElementById('countError');
  if (err && err.style.display !== 'none') err.textContent = t('step1_err');
  // 名前リストのplaceholder更新
  for (var i = 0; i < playerCount; i++) {
    var inp = document.getElementById('pname' + i);
    if (inp) inp.placeholder = '';
  }
  // 1人あたりゲーム数の再描画
  if (playerCount >= 4 && gameCount >= 1) {
    var gpp2 = (gameCount * 4 / playerCount).toFixed(1);
    if (gpp2.endsWith('.0')) gpp2 = gpp2.slice(0, -2);
    var tpl2 = t('games_per_person') || '1人あたりゲーム数：{n}ゲーム';
    var gppEl = document.getElementById('t-games-per-person');
    if (gppEl) gppEl.textContent = tpl2.replace('{n}', gpp2);
  }
  // renderGamesで使うテキストも再描画
  if (games.length > 0) renderGames();
}

window.addEventListener('load', function() {
  var saved = localStorage.getItem('score_game_lang') || 'ja';
  setLang(saved);
});

var playerCount = 0;
var activeRecognition = null;

function startVoiceCount(inputId, btnId, min, max, callback) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert(t('voice_not_supported')); return; }
  var btn = document.getElementById(btnId);
  var inp = document.getElementById(inputId);
  if (activeRecognition) { activeRecognition.stop(); activeRecognition = null; return; }
  var rec = new SR();
  rec.lang = 'ja-JP';
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  activeRecognition = rec;
  btn.classList.add('recording');
  btn.textContent = '🔴';
  rec.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    var num = transcript.replace(/人|回/g, '').replace(/[^\d０-９]/g, '')
      .replace(/[０-９]/g, function(c) { return String.fromCharCode(c.charCodeAt(0) - 0xFEE0); });
    if (!num) {
      var kanji = {'一':'1','二':'2','三':'3','四':'4','五':'5','六':'6','七':'7','八':'8','九':'9','十':'10','十一':'11','十二':'12','十三':'13','十四':'14','十五':'15','十六':'16','十七':'17','十八':'18','十九':'19','二十':'20'};
      num = kanji[transcript.replace(/人|回/g,'')] || '';
    }
    if (num) { inp.value = num; if (callback) callback(); }
    btn.classList.remove('recording'); btn.textContent = '🎤';
    activeRecognition = null;
  };
  rec.onerror = function() { btn.classList.remove('recording'); btn.textContent = '🎤'; activeRecognition = null; };
  rec.onend = function() { btn.classList.remove('recording'); btn.textContent = '🎤'; activeRecognition = null; };
  rec.start();
}

function convertToKatakana(text, callback) {
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 50,
      messages: [{
        role: 'user',
        content: '次の日本語をカタカナに変換してください。カタカナのみ返してください（説明不要）: ' + text
      }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var result = data.content && data.content[0] ? data.content[0].text.trim() : text;
    // カタカナ以外を除去
    result = result.replace(/[^゠-ヿ]/g, '').slice(0, 12);
    callback(result || text);
  })
  .catch(function() { callback(text); });
}

function startVoice(idx) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert(t('voice_not_supported')); return; }
  var btn = document.getElementById('mic' + idx);
  var inp = document.getElementById('pname' + idx);
  if (activeRecognition) { activeRecognition.stop(); activeRecognition = null; return; }
  var rec = new SR();
  rec.lang = 'ja-JP';
  rec.interimResults = false;
  rec.maxAlternatives = 5;
  activeRecognition = rec;
  btn.classList.add('recording');
  btn.textContent = '🔴';
  rec.onresult = function(e) {
    var best = null;
    for (var k = 0; k < e.results[0].length; k++) {
      var candidate = e.results[0][k].transcript;
      if (/^[\u3041-\u30FF\s]+$/.test(candidate)) { best = candidate; break; }
    }
    if (!best) best = e.results[0][0].transcript;
    btn.classList.remove('recording'); btn.textContent = '🎤';
    activeRecognition = null;

    // カタカナ→ひらがな変換、漢字はそのまま入力
    var tt = best.slice(0, 12).replace(/[\u30A1-\u30F6]/g, function(c) {
      return String.fromCharCode(c.charCodeAt(0) - 0x60);
    }).trim();
    if (!tt) tt = best.slice(0, 12);
    inp.value = tt;
    if (idx < playerCount - 1) {
      setTimeout(function() {
        var next = document.getElementById('pname' + (idx + 1));
        if (next) next.focus();
      }, 150);
    }
  };
  rec.onerror = function() { btn.classList.remove('recording'); btn.textContent = '🎤'; activeRecognition = null; };
  rec.onend = function() { btn.classList.remove('recording'); btn.textContent = '🎤'; activeRecognition = null; };
  rec.start();
}
var gameCount = 0;
var noNameMode = false;
var players = [];
var games = [];
var isFinished = false;

function onNoNameChange() {
  noNameMode = document.getElementById('noNameChk').checked;
  onSettingChange();
}

function onSettingChange() {
  var pc = parseInt(document.getElementById('playerCountInput').value) || 0;
  var gc = parseInt(document.getElementById('gameCountInput').value) || 0;
  var err = document.getElementById('countError');
  var nameCard = document.getElementById('nameCard');
  var startBtn = document.getElementById('startBtn');

  if (pc >= 4 && pc <= 20) {
    err.style.display = 'none';
    playerCount = pc;
    if (!noNameMode) {
      renderNameList();
      nameCard.style.display = 'block';
    } else {
      nameCard.style.display = 'none';
    }
  } else {
    if (pc > 0) { err.textContent = t('step1_err'); err.style.display = 'block'; }
    nameCard.style.display = 'none';
    playerCount = 0;
  }

  gameCount = gc;
  var ok = playerCount >= 4 && gameCount >= 1;
  startBtn.disabled = !ok;

  // 1人あたりゲーム数を計算して表示
  var gppCard = document.getElementById('gamesPerPersonCard');
  if (playerCount >= 4 && gameCount >= 1) {
    var gpp = (gameCount * 4 / playerCount).toFixed(1);
    // .0は省略
    if (gpp.endsWith('.0')) gpp = gpp.slice(0, -2);
    var tpl = t('games_per_person') || '1人あたりゲーム数：{n}ゲーム';
    document.getElementById('t-games-per-person').textContent = tpl.replace('{n}', gpp);
    gppCard.style.display = 'block';
  } else {
    gppCard.style.display = 'none';
  }
}

function renderNameList() {
  var list = document.getElementById('nameList');
  var existing = Array.from(list.querySelectorAll('.name-input')).map(function(i) { return i.value; });
  list.innerHTML = '';
  for (var i = 0; i < playerCount; i++) {
    var row = document.createElement('div');
    row.className = 'name-row';
    var num = document.createElement('div');
    num.className = 'name-num';
    num.textContent = i + 1;
    var inp = document.createElement('input');
    inp.className = 'name-input';
    inp.id = 'pname' + i;
    inp.type = 'text';
    inp.placeholder = '';
    inp.maxLength = 12;
    inp.value = existing[i] || '';
    var mic = document.createElement('button');
    mic.className = 'mic-btn';
    mic.id = 'mic' + i;
    mic.textContent = '🎤';
    mic.type = 'button';
    (function(idx) {
      mic.addEventListener('click', function() { startVoice(idx); });
    })(i);
    row.appendChild(num);
    row.appendChild(inp);
    row.appendChild(mic);
    list.appendChild(row);
  }
}

function getPlayers() {
  var result = [];
  for (var i = 0; i < playerCount; i++) {
    if (noNameMode) {
      result.push(String(i + 1));
    } else {
      var el = document.getElementById('pname' + i);
      var v = el ? el.value.trim() : '';
      result.push(v ? v : String(i+1));
    }
  }
  return result;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

var pairHistory = {};

function getPairKey(a, b) { return [a, b].sort().join('|||'); }
function getPairCount(a, b) { return pairHistory[getPairKey(a, b)] || 0; }

// 各選手の出場回数を管理
var playCount = {};

function getPlayCount(p) { return playCount[p] || 0; }

function selectFourPlayers(arr) {
  // 出場回数でグループ分けして、少ない順に4人選ぶ
  // 同じ回数のグループ内はランダム
  var sorted = arr.slice().sort(function(a, b) {
    var diff = getPlayCount(a) - getPlayCount(b);
    return diff !== 0 ? diff : Math.random() - 0.5;
  });
  // 最小回数のグループと次のグループを分けて処理
  var groups = [];
  var current = [];
  var currentCount = -1;
  sorted.forEach(function(p) {
    var cnt = getPlayCount(p);
    if (cnt !== currentCount) {
      if (current.length > 0) groups.push(shuffle(current));
      current = [p];
      currentCount = cnt;
    } else {
      current.push(p);
    }
  });
  if (current.length > 0) groups.push(shuffle(current));
  // グループを順に取り出して4人になるまで選ぶ
  var selected = [];
  for (var gi = 0; gi < groups.length && selected.length < 4; gi++) {
    var need = 4 - selected.length;
    var grp = groups[gi];
    if (grp.length <= need) {
      selected = selected.concat(grp);
    } else {
      // グループから必要な人数だけランダムに選ぶ
      selected = selected.concat(grp.slice(0, need));
    }
  }
  var rest = arr.filter(function(p) { return selected.indexOf(p) === -1; });
  return selected.concat(rest);
}

function shuffleWithPairAvoidance(arr) {
  var best = null, bestScore = Infinity;
  var selected = selectFourPlayers(arr);
  // 選ばれた4人の中でペア重複を最小化
  var front4 = selected.slice(0, 4);
  var rest = selected.slice(4);
  for (var t = 0; t < 100; t++) {
    var s = shuffle(front4);
    var score = getPairCount(s[0], s[1]) + getPairCount(s[2], s[3]);
    if (score < bestScore) { bestScore = score; best = s; if (score === 0) break; }
  }
  return best.concat(rest);
}

function startGame() {
  players = getPlayers();
  games = [];
  pairHistory = {};
  playCount = {};

  for (var g = 0; g < gameCount; g++) {
    var shuffled = shuffleWithPairAvoidance(players);
    var teamA = [shuffled[0], shuffled[1]];
    var teamB = [shuffled[2], shuffled[3]];
    var waiting = shuffled.slice(4);
    // ペア記録
    var k1 = getPairKey(teamA[0], teamA[1]);
    var k2 = getPairKey(teamB[0], teamB[1]);
    pairHistory[k1] = (pairHistory[k1] || 0) + 1;
    pairHistory[k2] = (pairHistory[k2] || 0) + 1;
    // 出場回数を記録（先に更新してスナップショット保存）
    teamA.concat(teamB).forEach(function(p) { playCount[p] = (playCount[p] || 0) + 1; });
    var snapCount = {};
    teamA.concat(teamB).forEach(function(p) { snapCount[p] = playCount[p]; });
    games.push({ id: g, teamA: teamA, teamB: teamB, waiting: waiting, scoreA: '', scoreB: '', done: false, winner: null, snapCount: snapCount });
  }

  renderGames();
  enableTab('game');
  showScreen('game');
  window.scrollTo(0, 0);
}

function renderGames() {
  var list = document.getElementById('gameList');
  list.innerHTML = '';
  games.forEach(function(g, i) {
    var isActive = !g.done && (i === 0 || games[i-1].done);
    var card = document.createElement('div');
    card.className = 'game-card' + (g.done ? ' done' : (isActive ? ' active' : ''));
    card.id = 'game-card-' + i;

    var headerClass = g.done ? 'done' : (isActive ? 'active' : '');
    var headerIcon = g.done ? '✅' : (isActive ? '🎾' : '⏳');
    var headerTitle = t('game_title').replace('{n}', i+1);
    var scoreSum = '';
    var collapsed = g.done && !g.expanded && !isFinished;

    var header = '<div class="game-header ' + headerClass + '" style="' + (g.done && !isFinished ? 'cursor:pointer' : '') + '">'
      + '<span class="game-title" ' + (g.done && !isFinished ? 'onclick="toggleGame(' + i + ')"' : '') + ' style="flex:1">' + headerIcon + ' ' + headerTitle + (g.done ? scoreSum : '') + '</span>'
      + (g.done && !isFinished ? '<button class="edit-btn" onclick="event.stopPropagation();editGame(' + i + ')" style="margin-right:6px;font-size:11px;padding:3px 8px" title="点数変更">✏️</button>' : '')
      + (g.done && !isFinished ? '<span style="font-size:12px" onclick="toggleGame(' + i + ')">' + (collapsed ? '▶' : '▼') + '</span>' : '')
      + '</div>';

    var teamAClass = 'team' + (g.winner === 'A' ? ' winner' : '');
    var teamBClass = 'team' + (g.winner === 'B' ? ' winner' : '');
    var winIconA = g.winner === 'A' ? ' 🏆' : '';
    var winIconB = g.winner === 'B' ? ' 🏆' : '';

    function pnameWithCount(name, snap) {
      var cnt = snap ? (snap[name] || '') : '';
      var idx = players.indexOf(name);
      var num = idx >= 0 ? (idx + 1) : '';
      var isNumName = !isNaN(name.trim());
      var displayName = (!isNumName && num) ? '<span style="font-size:14px;color:#CCCCCC;margin-right:5px">' + num + '</span>' + name : name;
      return '<div class="pname">' + displayName + (cnt ? '<span style="font-size:10px;color:#CCCCCC;margin-left:3px">(' + cnt + ')</span>' : '') + '</div>';
    }
    var snap = g.snapCount || {};
    var winLblA = g.winner === 'A' ? ' 🏆' : '';
    var winLblB = g.winner === 'B' ? ' 🏆' : '';
    var body = '<div class="game-body">'
      + '<div class="vs-grid">'
      + '<div class="' + teamAClass + '">' + (winLblA ? '<div style="font-size:11px;color:var(--green);font-weight:700;margin-bottom:4px">🏆</div>' : '') + pnameWithCount(g.teamA[0], snap) + pnameWithCount(g.teamA[1], snap) + '</div>'
      + '<div class="vs-text">VS</div>'
      + '<div class="' + teamBClass + '">' + (winLblB ? '<div style="font-size:11px;color:var(--green);font-weight:700;margin-bottom:4px">🏆</div>' : '') + pnameWithCount(g.teamB[0], snap) + pnameWithCount(g.teamB[1], snap) + '</div>'
      + '</div>';



    if (g.done) {
      body += '<div class="score-inputs" style="margin-top:8px">'
        + '<div class="score-input done" style="text-align:center">' + g.scoreA + '</div>'
        + '<div class="score-vs">-</div>'
        + '<div class="score-input done" style="text-align:center">' + g.scoreB + '</div>'
        + '</div>';
    } else if (isActive) {
      body += '<div class="score-row">'
        + '<div class="score-inputs">'
        + '<input class="score-input" id="scoreA-' + i + '" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="0" value="' + g.scoreA + '" oninput="this.value=this.value.replace(/[^0-9]/g,\'\');checkScore(' + i + ');if(this.value.length>=1)document.getElementById(\'scoreB-' + i + '\').focus();">'
        + '<div class="score-vs">-</div>'
        + '<input class="score-input" id="scoreB-' + i + '" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="0" value="' + g.scoreB + '" oninput="this.value=this.value.replace(/[^0-9]/g,\'\');checkScore(' + i + ')">'
        + '</div>'
        + '<button class="confirm-btn" id="confirmBtn-' + i + '" onclick="confirmScore(' + i + ')" disabled>' + t('confirm_btn') + '</button>'
        + '</div>';
    }


    body += '</div>';
    if (g.done && !g.expanded && !isFinished) {
      card.innerHTML = header;
    } else {
      card.innerHTML = header + body;
    }
    list.appendChild(card);
  });
  // ボタン状態を常に同期
  var ab = document.getElementById('addGameBtn');
  var eb = document.getElementById('endGameBtn');
  if (ab) ab.disabled = isFinished;
  if (eb) eb.disabled = isFinished;
}

function checkScore(idx) {
  var a = document.getElementById('scoreA-' + idx);
  var b = document.getElementById('scoreB-' + idx);
  var btn = document.getElementById('confirmBtn-' + idx);
  if (!btn) return;
  var ok = a && b && a.value !== '' && b.value !== '';
  btn.disabled = !ok;
}

function confirmScore(idx) {
  var sA = document.getElementById('scoreA-' + idx).value;
  var sB = document.getElementById('scoreB-' + idx).value;
  if (sA === '' || sB === '') { alert(t('score_alert')); return; }
  var a = parseInt(sA), b = parseInt(sB);
  games[idx].scoreA = sA;
  games[idx].scoreB = sB;
  games[idx].done = true;
  games[idx].expanded = false;
  games[idx].winner = a > b ? 'A' : (b > a ? 'B' : null);
  renderGames();
  // 次のゲームのscoreAにフォーカス＋キーボード表示
  setTimeout(function() {
    var nextInput = document.getElementById('scoreA-' + (idx + 1));
    if (nextInput) {
      nextInput.focus();
      nextInput.click();
    }
  }, 100);
}

function toggleGame(idx) {
  games[idx].expanded = !games[idx].expanded;
  renderGames();
}

function editGame(idx) {
  games[idx].done = false;
  games[idx].winner = null;
  renderGames();
  // 既存の値があれば確定ボタンを活性化
  setTimeout(function() { checkScore(idx); }, 50);
}

function showResult() {
  isFinished = true;
  document.body.classList.add('finished');
  var chk = document.getElementById('noNameChk');
  if (chk) chk.disabled = true;
  // 未完了ゲームを除外
  games = games.filter(function(g) { return g.done; });
  enableTab('result');
  renderGames();
  var stats = {};
  players.forEach(function(p) { stats[p] = { wins: 0, points: 0 }; });

  games.forEach(function(g) {
    if (!g.done) return;
    var sA = parseInt(g.scoreA) || 0;
    var sB = parseInt(g.scoreB) || 0;
    // 得点を各選手に加算
    g.teamA.forEach(function(p) { if (stats[p]) stats[p].points += sA; });
    g.teamB.forEach(function(p) { if (stats[p]) stats[p].points += sB; });
    // 勝利数
    if (!g.winner) return;
    var winners = g.winner === 'A' ? g.teamA : g.teamB;
    winners.forEach(function(p) { if (stats[p]) stats[p].wins += 1; });
  });

  var sorted = Object.keys(stats).map(function(p) {
    return { name: p, wins: stats[p].wins, points: stats[p].points };
  }).sort(function(a, b) {
    if (b.wins !== a.wins) return b.wins - a.wins;
    return b.points - a.points; // 勝利数同じ場合は得点合計で決める
  });

  var rankList = document.getElementById('rankList');
  var medals = ['🥇', '🥈', '🥉'];
  var medalClass = ['gold', 'silver', 'bronze'];
  var html = '';
  var rank = 1;
  sorted.forEach(function(p, i) {
    if (i > 0 && (p.wins < sorted[i-1].wins || (p.wins === sorted[i-1].wins && p.points < sorted[i-1].points))) rank = i + 1;
    var medal = rank <= 3 ? medals[rank-1] : rank;
    var cls = rank <= 3 ? medalClass[rank-1] : '';
    html += '<div class="rank-row">'
      + '<div class="rank-num ' + cls + '">' + medal + '</div>'
      + '<div class="rank-name">' + p.name + '</div>'
      + '<div style="text-align:right;font-size:14px;font-weight:700;color:var(--green);min-width:36px">' + p.wins + t('wins') + '</div>'
      + '<div style="text-align:right;font-size:14px;color:var(--text);font-weight:400;min-width:54px">（' + p.points + t('points_suffix') + '）</div>'
      + '</div>';
  });
  rankList.innerHTML = html || '<div class="empty">' + t('no_result') + '</div>';

  showScreen('result');
}

function addGame() {
  if (players.length < 4) return;
  var shuffled = shuffleWithPairAvoidance(players);
  var teamA = [shuffled[0], shuffled[1]];
  var teamB = [shuffled[2], shuffled[3]];
  var waiting = shuffled.slice(4);
  var k1 = getPairKey(teamA[0], teamA[1]);
  var k2 = getPairKey(teamB[0], teamB[1]);
  pairHistory[k1] = (pairHistory[k1] || 0) + 1;
  pairHistory[k2] = (pairHistory[k2] || 0) + 1;
  teamA.concat(teamB).forEach(function(p) { playCount[p] = (playCount[p] || 0) + 1; });
  var snapCount2 = {};
  teamA.concat(teamB).forEach(function(p) { snapCount2[p] = playCount[p]; });
  var idx = games.length;
  games.push({ id: idx, teamA: teamA, teamB: teamB, waiting: waiting, scoreA: '', scoreB: '', done: false, winner: null, snapCount: snapCount2 });
  renderGames();
}

function showScreen(name) {
  window.scrollTo(0, 0);
  ['main','game','result'].forEach(function(n) {
    document.getElementById('screen-' + n).classList.toggle('active', n === name);
    var tab = document.getElementById('tab-' + n);
    if (tab) tab.classList.toggle('active', n === name);
  });
  // ゲーム画面ボタン状態を同期（startBtnはonSettingChangeで管理するので除外）
  var _ab = document.getElementById('addGameBtn');
  var _eb = document.getElementById('endGameBtn');
  if (_ab) _ab.disabled = isFinished;
  if (_eb) _eb.disabled = isFinished;
}
function enableTab(name) {
  var tab = document.getElementById('tab-' + name);
  if (tab) tab.disabled = false;
}

function resetAll() {
  playerCount = 0; gameCount = 0; noNameMode = false; players = []; games = []; pairHistory = {}; playCount = {}; isFinished = false;
  document.body.classList.remove('finished');
  document.getElementById('startBtn').style.display = '';
  var ab = document.getElementById('addGameBtn');
  var eb = document.getElementById('endGameBtn');
  if (ab) ab.style.display = '';
  if (eb) eb.style.display = '';
  ['playerCountInput','gameCountInput'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.style.pointerEvents = ''; el.style.border = ''; el.style.background = ''; }
  });
  document.getElementById('playerCountInput').value = '';
  document.getElementById('gameCountInput').value = '';
  document.getElementById('noNameChk').checked = false;
  document.getElementById('noNameChk').disabled = false;
  document.getElementById('nameCard').style.display = 'none';
  document.getElementById('nameList').innerHTML = '';
  document.getElementById('gamesPerPersonCard').style.display = 'none';
  document.getElementById('startBtn').disabled = true;
  ['game','result'].forEach(function(n) {
    var tab = document.getElementById('tab-' + n);
    if (tab) tab.disabled = true;
  });
  showScreen('main');
}
